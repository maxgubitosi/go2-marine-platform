camera:
  # Intrinsecos del dron (Gazebo): calculados desde horizontal_fov y resolucion.
  # Fuente: src/drone/urdf/drone_camera.xacro
  matrix:
    - [381.4631664, 0.0, 320.0]
    - [0.0, 381.4631664, 240.0]
    - [0.0, 0.0, 1.0]
  # Distorsion (k1, k2, p1, p2, k3) del sensor simulado
  dist_coeffs: [-0.05, 0.02, 0.001, -0.001, 0.0]

  # Pose fija del dron en world (si aplica)
  fixed_pose_world:
    x: 0.0
    y: 0.0
    z: 2.0
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  # Extrinsecas cámara respecto a drone_base_link
  extrinsics:
    base_to_camera_link_xyz: [0.0, 0.0, -0.055]
    base_to_camera_link_rpy: [0.0, 1.57079632679, 0.0]
    camera_link_to_optical_xyz: [0.0, 0.0, 0.0]
    camera_link_to_optical_rpy: [-1.57079632679, 0.0, -1.57079632679]

aruco:
  # Diccionario ArUco base
  dictionary: DICT_6X6_250
  # Lado del marcador en metros
  marker_length_m: 0.50
  # ID del marcador (si aplica)
  target_id: 0
  # Offset de yaw para alinear con GT (rad)
  yaw_offset_rad: -1.57079632679

  # Patron 6x6 (1 blanco, 0 negro) con borde negro completo
  # Ya no se necesita: usamos el diccionario estandar DICT_6X6_250 ID 0 directamente.
  # bit_pattern:
  #   - "000111"
  #   - "100011"
  #   - "110111"
  #   - "011000"
  #   - "001010"
  #   - "100110"
  # bit_one_is_white: true

  # Offset del marcador respecto al trunk (m)
  marker_offset_xyz: [0.0, 0.0, 0.091]

  # (Opcional) Xacro con el patrón 6x6 (se usa solo si no hay bit_pattern)
  # Ya no necesario con ArUco estandar
  # xacro_path: src/unitree-go2-ros2/robots/descriptions/go2_description/xacro/platform.xacro

  # Deteccion por cuadrado oscuro (fallback)
  quad_detection:
    enabled: true
    min_area_ratio: 0.0005

  # Template matching como ultimo fallback
  template_match:
    enabled: false
    threshold: 0.38
    scales: [0.10, 0.12, 0.15, 0.18, 0.20, 0.25, 0.30, 0.35]

gt:
  # Mapeo de columnas del CSV al ground truth del robot
  columns:
    x: position_x
    y: position_y
    z: heave
    roll: roll
    pitch: pitch
    yaw: yaw
