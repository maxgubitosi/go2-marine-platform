# Configuración del dron y su controlador

drone_controller:
  ros__parameters:
    # Posición inicial del dron en el mundo
    initial_height: 2.0          # metros sobre el suelo (ajustado para ver mejor el ArUco)
    position_x: 0.0              # posición X fija en el mundo
    position_y: -0.3             # posición Y fija en el mundo
    
    # Movimiento vertical
    vertical_range: 0.5          # rango de movimiento vertical (±0.5m, más controlado)
    vertical_velocity: 0.2       # velocidad de movimiento vertical (m/s)
    
    # Ruido de posición (simula error GPS, turbulencias)
    noise_position_std: 0.03     # desviación estándar posición (3cm, reducido)
    noise_orientation_std: 0.025 # desviación estándar orientación (~1.4°, reducido)
    
    # Tasa de actualización
    update_rate: 50.0            # Hz
    
    # Usar tiempo de simulación
    use_sim_time: true
