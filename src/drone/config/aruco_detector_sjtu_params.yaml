# Parámetros del detector ArUco para uso con sjtu_drone (cámara bottom)
aruco_detector:
  ros__parameters:
    dictionary: "DICT_6X6_250"
    target_id: 0
    marker_length_m: 0.50
    publish_debug_image: true
    # Topics de la cámara bottom del sjtu_drone (namespace = /drone)
    image_topic: "/drone/bottom/image_raw"
    camera_info_topic: "/drone/bottom/camera_info"
    use_sim_time: true
